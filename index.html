  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --surface-soft: #f7f7f6;
      --text: #1f1f1d;
      --muted: #66655f;
      --line: #e7e5df;
      --accent: #2f6f61;
      --accent-strong: #285d51;
      --radius: 16px;
      --shadow: 0 8px 20px rgba(31, 28, 20, 0.06);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      line-height: 1.45;
    }

    img { display: block; width: 100%; }
    a { color: inherit; text-decoration: none; }
    .container { width: min(1120px, calc(100% - 32px)); margin: 0 auto; }
    .section { padding: 54px 0; border-bottom: 1px solid var(--line); }
    .section-title { margin: 0; font-size: clamp(28px, 7vw, 46px); line-height: 1.08; letter-spacing: -0.02em; }
    .section-subtitle { margin: 10px 0 0; color: var(--muted); max-width: 740px; }

    .nav-wrap {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }
    .nav {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .brand { display: inline-flex; align-items: center; gap: 10px; }
    .brand-logo { height: 34px; width: auto; }
    .brand-text { margin: 0; font-size: 15px; letter-spacing: 0.11em; font-weight: 600; }

    .nav-links { display: none; gap: 14px; font-size: 13px; color: var(--muted); }

    .lang-switch {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
      background: var(--surface);
    }
    .lang-btn {
      min-width: 42px;
      min-height: 34px;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
    }
    .lang-btn.active {
      background: var(--surface-soft);
      color: var(--text);
      font-weight: 600;
    }

    .hero { padding: 54px 0; }
    .hero-title { margin: 0; font-size: clamp(34px, 10.5vw, 68px); line-height: 1; letter-spacing: -0.03em; }
    .hero-sub { margin: 14px 0 0; color: var(--muted); max-width: 700px; font-size: clamp(16px, 3.8vw, 20px); }

    .actions { margin-top: 24px; display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      min-height: 48px;
      border-radius: 12px;
      border: 1px solid transparent;
      padding: 12px 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      transition: .2s ease;
    }
    .btn-primary { color: #fff; background: var(--accent); }
    .btn-primary:hover { background: var(--accent-strong); }
    .btn-secondary { color: var(--text); border-color: var(--line); background: #fff; }

    .card {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .service-groups { margin-top: 22px; display: grid; gap: 14px; }
    .service-group { padding: 16px; }
    .group-title { margin: 0; font-size: 18px; }
    .service-list { margin: 12px 0 0; padding: 0; list-style: none; display: grid; gap: 8px; }
    .service-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      border-top: 1px dashed var(--line);
      padding-top: 8px;
      font-size: 14px;
      align-items: center;
    }
    .service-item:first-child { border-top: 0; padding-top: 0; }
    .duration { color: var(--muted); white-space: nowrap; }

    .packages-grid,
    .why-grid,
    .gallery-grid,
    .reviews-grid { margin-top: 22px; display: grid; grid-template-columns: 1fr; gap: 12px; }

    .package-card { padding: 16px; }
    .package-title { margin: 0; font-size: 18px; }
    .package-note { margin: 8px 0 0; color: var(--muted); font-size: 14px; }
    .package-list { margin: 10px 0 0; padding-left: 18px; color: var(--text); }

    .why-card { padding: 16px; font-size: 15px; }

    .gallery-card { overflow: hidden; }
    .gallery-card img { aspect-ratio: 4 / 3; object-fit: cover; }

    .review-card { padding: 16px; }
    .review-text { margin: 0; font-size: 15px; }
    .review-meta { margin-top: 8px; color: var(--muted); font-size: 13px; }

    .contact-grid { margin-top: 20px; display: grid; grid-template-columns: 1fr; gap: 12px; }
    .contact-card { padding: 16px; }
    .contact-label { margin: 0; color: var(--muted); font-size: 12px; letter-spacing: .08em; text-transform: uppercase; }
    .contact-value { margin: 9px 0 0; font-size: 17px; }

    .map-wrap { padding: 10px; }
    .map { width: 100%; min-height: 280px; border: 0; border-radius: 12px; }

    .final-cta { padding: 24px; }

    .floating-wa {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 30;
      min-height: 52px;
      border-radius: 999px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
    }

    @media (min-width: 760px) {
      .packages-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .why-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .gallery-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .reviews-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .contact-grid { grid-template-columns: 0.9fr 1.1fr; }
    }

    @media (min-width: 1000px) {
      .nav-links { display: inline-flex; }
      .section { padding: 70px 0; }
      .service-groups { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .packages-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .reviews-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }
  </style>
</head>

    const serviceGroups = document.getElementById('serviceGroups');
    const packagesGrid = document.getElementById('packagesGrid');
    const whyGrid = document.getElementById('whyGrid');
    const galleryGrid = document.getElementById('galleryGrid');
    const reviewsGrid = document.getElementById('reviewsGrid');

    let currentLanguage = localStorage.getItem('preferredLanguage') || 'en';

    function getPath(obj, key) {
      return key.split('.').reduce((acc, item) => (acc ? acc[item] : ''), obj);
    }

    function buildWaLink(message) {
      return `https://wa.me/${whatsappPhone}?text=${encodeURIComponent(message)}`;
    }

    function updateWhatsAppLinks() {
      const t = translations[currentLanguage];
      document.querySelectorAll('.wa-link').forEach((link) => {
        const kind = link.dataset.waKind || 'general';
        link.href = buildWaLink(t.wa[kind] || t.wa.general);
        link.target = '_blank';
        link.rel = 'noreferrer';
      });
    }

    function renderServices() {
      const groups = translations[currentLanguage].services.groups;
      serviceGroups.innerHTML = groups.map((group) => `
        <article class="card service-group">
          <h3 class="group-title">${group.category}</h3>
          <ul class="service-list">
            ${group.items.map((item) => `
              <li class="service-item">
                <span>${item[0]}</span>
                <span class="duration">${item[1]}</span>
              </li>
            `).join('')}
          </ul>
        </article>
      `).join('');

    }

    function renderPackages() {
      const items = translations[currentLanguage].packages.items;
      packagesGrid.innerHTML = items.map((item) => `
        <article class="card package-card">
          <h3 class="package-title">${item.name}</h3>
          <p class="package-note">${item.note}</p>
          <ul class="package-list">
            ${item.list.map((line) => `<li>${line}</li>`).join('')}
          </ul>
        </article>
      `).join('');
    }

    function renderWhy() {
      const items = translations[currentLanguage].why.items;
      whyGrid.innerHTML = items.map((item) => `<article class="card why-card">${item}</article>`).join('');
    }

    function renderGallery() {
      const items = translations[currentLanguage].gallery.items;
      galleryGrid.innerHTML = items.map((img) => `<article class="card gallery-card"><img src="${img}" alt="Spa photo" loading="lazy" /></article>`).join('');
    }

    function renderReviews() {
      const items = translations[currentLanguage].reviews.items;
      reviewsGrid.innerHTML = items.map((item) => `
        <article class="card review-card">
          <p class="review-text">“${item.text}”</p>
          <p class="review-meta">${item.by}</p>
        </article>
      `).join('');
    }

    function updateStaticText() {
      const t = translations[currentLanguage];
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const value = getPath(t, el.dataset.i18n);
        if (typeof value === 'string') el.textContent = value;
      });
      document.querySelectorAll('[data-lang-switch]').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.langSwitch === currentLanguage);
      });
      document.documentElement.lang = currentLanguage;
    }

    function applyLanguage(lang) {
      currentLanguage = translations[lang] ? lang : 'en';
      localStorage.setItem('preferredLanguage', currentLanguage);
      updateStaticText();
      renderServices();
      renderPackages();
      renderWhy();
      renderGallery();
      renderReviews();
      updateWhatsAppLinks();
    }

    document.querySelectorAll('[data-lang-switch]').forEach((btn) => {
      btn.addEventListener('click', () => applyLanguage(btn.dataset.langSwitch));
    });

    applyLanguage(currentLanguage);
  </script>
