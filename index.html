<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #000000;
      --surface: #111111;
      --surface-soft: #1d1b18;
      --text: #b8aca0;
      --muted: #8d7f73;
      --line: #2a241f;
      --accent: #5a4635;
      --accent-strong: #6d5542;
      --radius: 16px;
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.38);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      line-height: 1.45;
    }

    img { display: block; width: 100%; }
    a { color: inherit; text-decoration: none; }
    .container { width: min(1160px, calc(100% - 22px)); margin: 0 auto; }
    .section { padding: 46px 0; border-bottom: 1px solid var(--line); }
    .section-title { margin: 0; font-size: clamp(26px, 6vw, 44px); line-height: 1.12; letter-spacing: -0.02em; }
    .section-subtitle { margin: 10px 0 0; color: var(--muted); max-width: 700px; line-height: 1.55; }

    .nav-wrap {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(10, 10, 10, 0.92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }
    .nav {
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .brand { display: inline-flex; align-items: center; gap: 10px; }
    .brand-logo {
      height: 52px;
      width: auto;
      filter: brightness(0) saturate(100%) invert(77%) sepia(12%) saturate(256%) hue-rotate(345deg) brightness(88%) contrast(86%) drop-shadow(0 0 8px rgba(184, 172, 160, 0.42));
    }
    .brand-text { margin: 0; font-size: 15px; letter-spacing: 0.11em; font-weight: 600; }

    .nav-links { display: none; gap: 14px; font-size: 13px; color: var(--muted); }

    .lang-switch {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
      background: rgba(20, 17, 14, 0.7);
    }
    .lang-btn {
      min-width: 36px;
      min-height: 30px;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
    }
    .lang-btn.active {
      background: var(--surface-soft);
      color: var(--text);
      font-weight: 600;
    }

    .language-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.96);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .language-overlay.hidden { display: none; }
    .language-card {
      width: min(760px, 100%);
      padding: 28px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: var(--surface);
      box-shadow: var(--shadow);
    }
    .language-title { margin: 0; font-size: clamp(24px, 5vw, 38px); }
    .language-subtitle { margin: 12px 0 0; color: var(--muted); }
    .language-grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .language-option {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #151311;
      color: var(--text);
      font-size: 15px;
      min-height: 50px;
      padding: 10px 12px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      justify-content: center;
    }
    .language-option:hover { background: #1e1a16; }

    .hero { padding: 58px 0 44px; }
    .hero-title { margin: 0; font-size: clamp(34px, 9.8vw, 64px); line-height: 1.03; letter-spacing: -0.03em; max-width: 820px; }
    .hero-sub { margin: 14px 0 0; color: var(--muted); max-width: 620px; font-size: clamp(15px, 3.4vw, 19px); }

    .actions { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      min-height: 46px;
      border-radius: 11px;
      border: 1px solid transparent;
      padding: 10px 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      transition: .2s ease;
    }
    .btn-primary { color: #fff; background: var(--accent); }
    .btn-primary:hover { background: var(--accent-strong); }
    .btn-secondary { color: var(--text); border-color: var(--line); background: #151311; }

    .card {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.26);
    }

    .service-groups { margin-top: 18px; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .service-group { padding: 14px; }
    .group-title { margin: 0; font-size: 17px; }
    .service-list { margin: 10px 0 0; padding: 0; list-style: none; display: grid; gap: 6px; }
    .service-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      border-top: 1px dashed var(--line);
      padding-top: 6px;
      font-size: 13px;
      align-items: center;
    }
    .service-item:first-child { border-top: 0; padding-top: 0; }
    .duration { color: var(--muted); white-space: nowrap; }

    .packages-grid,
    .why-grid,
    .gallery-grid { margin-top: 18px; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .reviews-grid { margin-top: 18px; display: grid; grid-template-columns: 1fr; gap: 12px; }

    .package-card {
      padding: 14px;
      background: linear-gradient(180deg, #17130f 0%, #12100d 100%);
      border-color: #3a2e23;
    }
    .package-title { margin: 0; font-size: 18px; font-weight: 700; }
    .package-note { margin: 6px 0 0; color: #c5b7aa; font-size: 13px; }
    .package-meta { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
    .package-pill {
      display: inline-flex;
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }
    .package-list { margin: 10px 0 0; padding-left: 16px; color: var(--text); font-size: 13px; display: grid; gap: 4px; }
    .package-cta { margin-top: 12px; width: 100%; min-height: 40px; font-size: 13px; }

    .why-card { padding: 14px; font-size: 13px; min-height: 100%; line-height: 1.45; }

    .gallery-card { overflow: hidden; }
    .gallery-card img { aspect-ratio: 4 / 3; object-fit: cover; min-height: 100%; }
    .gallery-open { width: 100%; border: 0; background: transparent; padding: 0; cursor: pointer; }

    .review-card { padding: 16px; }
    .review-text { margin: 0; font-size: 14px; line-height: 1.55; }
    .review-meta { margin-top: 8px; color: var(--muted); font-size: 13px; }

    .contact-grid { margin-top: 18px; display: grid; grid-template-columns: 1fr; gap: 10px; }
    .contact-card { padding: 14px; }
    .contact-label { margin: 0; color: var(--muted); font-size: 12px; letter-spacing: .08em; text-transform: uppercase; }
    .contact-value { margin: 8px 0 0; font-size: 16px; line-height: 1.45; }

    .final-cta { padding: 20px; }

    .floating-wa {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 30;
      min-height: 46px;
      border-radius: 999px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
    }

    #services .card { background: #121212; border-color: #2a2622; }



    .clickable-service {
      width: 100%;
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      padding: 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      text-align: left;
      cursor: pointer;
      align-items: center;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.82);
      z-index: 120;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .modal-overlay.open { display: flex; }

    .modal-card {
      width: min(640px, 100%);
      max-height: 86vh;
      overflow: auto;
      border: 1px solid var(--line);
      background: #13110e;
      border-radius: 16px;
      padding: 18px;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #1a1713;
      color: var(--text);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }

    .hotel-options { margin-top: 14px; display: grid; gap: 8px; }
    .hotel-option { width: 100%; justify-content: space-between; text-align: left; }
    .hotel-option small { color: var(--muted); font-size: 12px; }

    .service-modal-title { margin: 0 32px 8px 0; font-size: 22px; }
    .service-modal-meta { color: var(--muted); font-size: 13px; margin: 0 0 10px; }

    .gallery-lightbox { width: min(940px, 100%); }
    .gallery-stage { margin-top: 14px; }
    .gallery-stage img { width: 100%; max-height: 72vh; object-fit: contain; border-radius: 12px; }
    .gallery-nav { margin-top: 12px; display: flex; justify-content: space-between; gap: 10px; }

    @media (max-width: 359px) {
      .service-groups,
      .packages-grid,
      .why-grid,
      .gallery-grid { grid-template-columns: 1fr; }
    }

    @media (min-width: 760px) {
      .container { width: min(1160px, calc(100% - 42px)); }
      .service-groups { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .packages-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .why-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .gallery-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .reviews-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .contact-grid { grid-template-columns: 0.9fr 1.1fr; }
    }

    @media (min-width: 1000px) {
      .nav-links { display: inline-flex; }
      .section { padding: 70px 0; }
      .service-groups { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .packages-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .gallery-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .reviews-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    @media (min-width: 760px) {
      .floating-wa { display: none; }
    }
  </style>
</head>

            ${item.duration ? `<span class="package-pill">${item.duration}</span>` : ''}
          </div>
          <ul class="package-list">
            ${item.list.slice(0, 5).map((line) => `<li>${line}</li>`).join('')}
          </ul>
          <button type="button" class="btn btn-primary wa-picker-trigger package-cta">${t.buttons.packageCta}</button>
        </article>
      `).join('');
    }

    function renderWhy() {
      const items = translations[currentLanguage].why.items;
      whyGrid.innerHTML = items.map((item) => `<article class="card why-card">${item}</article>`).join('');
    }

    function renderGallery() {
      const items = translations[currentLanguage].gallery.items;
      currentGalleryItems = items;
      galleryGrid.innerHTML = items.map((img, index) => `<article class="card gallery-card"><button type="button" class="gallery-open" data-gallery-index="${index}"><img src="${img}" alt="Spa photo" loading="lazy" /></button></article>`).join('');
    }

    function renderReviews() {
      const items = translations[currentLanguage].reviews.items;
      reviewsGrid.innerHTML = items.map((item) => `
        <article class="card review-card">
          <p class="review-text">“${item.text}”</p>
          <p class="review-meta">${item.by}</p>
        </article>
      `).join('');
    }


    function getServiceDescription(name, category) {
      const descriptions = {
        en: `${name} is a focused ${category.toLowerCase()} treatment designed to relax muscles, improve circulation, and support recovery.`,
        ru: `${name} — это процедура категории «${category}», направленная на расслабление мышц, улучшение кровообращения и восстановление.`,
        tr: `${name}, kasları gevşetmek, dolaşımı desteklemek ve toparlanmayı hızlandırmak için uygulanan ${category.toLowerCase()} odaklı bir bakımdır.`,
        de: `${name} ist eine gezielte Anwendung aus der Kategorie ${category}, die Muskeln entspannt und die Regeneration unterstützt.`,
        pl: `${name} to zabieg z kategorii ${category}, który rozluźnia mięśnie, wspiera krążenie i regenerację.`,
        fr: `${name} est un soin ciblé de la catégorie ${category}, conçu pour détendre les muscles et soutenir la récupération.`
      };
      return descriptions[currentLanguage] || descriptions.en;
    }

    function openServiceModal(name, duration, category) {
      serviceModalTitle.textContent = name;
      serviceModalMeta.textContent = `${category} • ${duration}`;
      serviceModalDescription.textContent = getServiceDescription(name, category);
      openModal(serviceModal);
    }

    function updateGalleryImage() {
      lightboxImage.src = currentGalleryItems[currentGalleryIndex] || '';
    }

    function openGallery(index) {
      currentGalleryIndex = index;
      updateGalleryImage();
      openModal(galleryModal);
    }

    function updateStaticText() {
      const t = translations[currentLanguage];
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const value = getPath(t, el.dataset.i18n);
        if (typeof value === 'string') el.textContent = value;
      });
      document.querySelectorAll('[data-lang-switch]').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.langSwitch === currentLanguage);
      });
      document.documentElement.lang = currentLanguage;
    }

    function applyLanguage(lang) {
      currentLanguage = translations[lang] ? lang : 'en';
      localStorage.setItem('preferredLanguage', currentLanguage);
      updateStaticText();
      renderServices();
      renderPackages();
      renderWhy();
      renderGallery();
      renderReviews();
      renderWaPicker();
    }

    document.querySelectorAll('[data-lang-switch]').forEach((btn) => {
      btn.addEventListener('click', () => applyLanguage(btn.dataset.langSwitch));
    });

    document.querySelectorAll('[data-lang-pick]').forEach((btn) => {
      btn.addEventListener('click', () => {
        applyLanguage(btn.dataset.langPick);
        languageOverlay.classList.add('hidden');
      });
    });


    document.addEventListener('click', (event) => {
      const waTrigger = event.target.closest('.wa-picker-trigger');
      if (waTrigger) {
        event.preventDefault();
        openWaPicker();
      }

      const serviceTrigger = event.target.closest('[data-service-name]');
      if (serviceTrigger) {
        openServiceModal(serviceTrigger.dataset.serviceName, serviceTrigger.dataset.serviceDuration, serviceTrigger.dataset.serviceCategory);
      }

      const galleryTrigger = event.target.closest('[data-gallery-index]');
      if (galleryTrigger) {
        openGallery(Number(galleryTrigger.dataset.galleryIndex));
      }
    });

    [waPicker, serviceModal, galleryModal].forEach((modal) => {
      modal.addEventListener('click', (event) => {
        if (event.target === modal) closeModal(modal);
      });
    });

    document.querySelectorAll('[data-close-modal]').forEach((btn) => {
      btn.addEventListener('click', () => closeModal(document.getElementById(btn.dataset.closeModal)));
    });

    galleryPrev.addEventListener('click', () => {
      if (!currentGalleryItems.length) return;
      currentGalleryIndex = (currentGalleryIndex - 1 + currentGalleryItems.length) % currentGalleryItems.length;
      updateGalleryImage();
    });

    galleryNext.addEventListener('click', () => {
      if (!currentGalleryItems.length) return;
      currentGalleryIndex = (currentGalleryIndex + 1) % currentGalleryItems.length;
      updateGalleryImage();
    });

    applyLanguage(currentLanguage);
  </script>
</body>
</html>
