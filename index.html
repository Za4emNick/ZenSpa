<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #050505;
      --card: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.12);
      --gold: #cfb87c;
      --gold-deep: #b79553;
      --text: #fff;
      --muted: rgba(255, 255, 255, 0.74);
      --radius: 18px;
      --shadow: 0 14px 36px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, rgba(207, 184, 124, 0.15), transparent 30%), linear-gradient(180deg, #020202 0%, #080808 46%, #020202 100%);
      line-height: 1.45;
      padding-bottom: 90px;
    }

    a { color: inherit; text-decoration: none; }
    img { width: 100%; display: block; }
    .container { width: min(1140px, calc(100% - 28px)); margin: 0 auto; }
    .section { padding: 56px 0; border-bottom: 1px solid var(--border); }
    .eyebrow { color: var(--gold); font-size: 11px; text-transform: uppercase; letter-spacing: 0.22em; margin: 0; }
    .section-title { margin: 10px 0 0; font-size: clamp(28px, 6vw, 52px); font-weight: 300; letter-spacing: 0.08em; line-height: 1.08; }

    .app-shell { opacity: 0; pointer-events: none; transition: opacity 0.45s ease; }
    .app-shell.ready { opacity: 1; pointer-events: auto; }

    .nav-wrap {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(8px);
      background: rgba(3, 3, 3, 0.84);
      border-bottom: 1px solid var(--border);
    }
    .nav { min-height: 74px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .brand { display: inline-flex; align-items: center; gap: 14px; }
    .brand-logo { width: auto; height: 34px; object-fit: contain; filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.6)) saturate(1.05); }
    .brand-text { margin: 0; font-size: clamp(18px, 4vw, 28px); font-weight: 300; letter-spacing: 0.16em; white-space: nowrap; text-transform: uppercase; }
    .brand-text span { color: var(--gold); }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .nav-links { display: none; gap: 16px; font-size: 12px; letter-spacing: 0.13em; text-transform: uppercase; color: var(--muted); }

    .lang-switch {
      display: inline-flex;
      border: 1px solid rgba(207, 184, 124, 0.35);
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.03);
    }
    .lang-btn {
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.08em;
      min-width: 40px;
      min-height: 34px;
      cursor: pointer;
    }
    .lang-btn.active { color: #080808; background: linear-gradient(180deg, var(--gold) 0%, var(--gold-deep) 100%); font-weight: 700; }

    .hero { padding: 32px 0 54px; }
    .hero-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
    .hero h2 { margin: 12px 0 0; font-size: clamp(40px, 13vw, 90px); line-height: 0.95; font-weight: 300; letter-spacing: 0.14em; }
    .hero h2 span { color: var(--gold); }
    .hero-sub { margin: 14px 0 0; max-width: 500px; color: var(--muted); font-size: 16px; }
    .hero-meta { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; }
    .meta-pill { border: 1px solid rgba(207, 184, 124, 0.34); color: #f2e4be; background: rgba(255, 255, 255, 0.03); border-radius: 999px; font-size: 12px; padding: 8px 12px; }

    .card { border: 1px solid var(--border); border-radius: var(--radius); background: var(--card); box-shadow: var(--shadow); overflow: hidden; }

    .hero-panel { padding: 20px; border-radius: 22px; border: 1px solid rgba(207, 184, 124, 0.32); background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02)); }
    .hero-panel h3 { margin: 0; font-size: 24px; font-weight: 300; letter-spacing: 0.08em; }
    .hero-panel p { margin: 8px 0 0; color: var(--muted); font-size: 14px; }

    .actions { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
    .btn { min-height: 50px; flex: 1 1 180px; display: inline-flex; align-items: center; justify-content: center; border-radius: 14px; border: 1px solid transparent; padding: 12px 16px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.13em; font-weight: 600; transition: transform 0.2s ease; }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary { color: #080808; background: linear-gradient(180deg, var(--gold) 0%, var(--gold-deep) 100%); border-color: rgba(207, 184, 124, 0.45); }
    .btn-secondary { border-color: var(--border); background: rgba(255, 255, 255, 0.03); }

    .quick-grid, .reviews-grid, .contact-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 22px; }
    .quick-card { padding: 16px; }
    .quick-title { margin: 0; font-size: 15px; }
    .quick-note { margin: 6px 0 0; font-size: 13px; color: var(--muted); }

    .packages-grid, .services-grid, .gallery-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-top: 20px; }
    .preview-card, .service-tile, .gallery-card {
      cursor: pointer;
      border-radius: 15px;
      overflow: hidden;
      position: relative;
      border: 1px solid var(--border);
      background: #111;
      min-height: 148px;
    }
    .preview-card img, .service-tile img, .gallery-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.35s ease; }
    .tile-overlay { position: absolute; inset: auto 0 0 0; padding: 10px; background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.82) 80%); z-index: 1; }
    .tile-title { margin: 0; font-size: 14px; font-weight: 500; letter-spacing: 0.03em; }
    .tile-tags { margin-top: 6px; display: flex; gap: 6px; flex-wrap: wrap; }
    .tile-tag { border-radius: 999px; border: 1px solid rgba(207, 184, 124, 0.35); background: rgba(207, 184, 124, 0.12); color: #f0dcab; font-size: 10px; padding: 4px 7px; white-space: nowrap; }
    .scene-label { position: absolute; left: 10px; bottom: 10px; z-index: 1; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #f0deaf; }

    .review-card { padding: 18px; }
    .stars { color: var(--gold); letter-spacing: 0.2em; font-size: 12px; }
    .review-text { margin: 8px 0 0; font-size: 14px; color: #f4f4f4; }

    .contact-box { padding: 18px; }
    .contact-box h3 { margin: 0; color: var(--gold); font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; }
    .contact-box p { margin: 10px 0 0; font-size: 20px; font-weight: 300; line-height: 1.35; }
    .contact-box small { margin-top: 7px; display: block; color: var(--muted); }
    .map { width: 100%; min-height: 330px; border: 0; border-radius: 16px; filter: grayscale(1) brightness(0.85) contrast(1.05); }

    .final-cta { padding: 28px; border: 1px solid rgba(207, 184, 124, 0.3); border-radius: 24px; background: radial-gradient(circle at top, rgba(207, 184, 124, 0.14), transparent 34%), rgba(255, 255, 255, 0.02); }

    .mobile-bar {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: 10px;
      z-index: 50;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 8px;
      border-radius: 16px;
      border: 1px solid rgba(207, 184, 124, 0.4);
      background: rgba(8, 8, 8, 0.95);
      backdrop-filter: blur(8px);
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.56);
    }
    .mobile-link { min-height: 48px; display: grid; place-items: center; border-radius: 10px; border: 1px solid var(--border); background: rgba(255, 255, 255, 0.03); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }
    .mobile-link.primary { color: #050505; font-weight: 700; border-color: rgba(207, 184, 124, 0.45); background: linear-gradient(180deg, var(--gold) 0%, var(--gold-deep) 100%); }

    .modal, .intro-screen {
      position: fixed;
      inset: 0;
      z-index: 90;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .intro-screen { z-index: 120; align-items: center; background: radial-gradient(circle at center, rgba(207, 184, 124, 0.16), rgba(0, 0, 0, 0.94) 45%, #000 100%); opacity: 1; pointer-events: auto; }
    .intro-screen.hide { opacity: 0; pointer-events: none; }
    .intro-inner { text-align: center; animation: introIn 1s ease both; }
    .intro-logo { height: clamp(84px, 18vw, 140px); width: auto; margin: 0 auto; filter: drop-shadow(0 12px 22px rgba(0, 0, 0, 0.7)); }
    .intro-welcome { margin: 16px 0 0; color: #f3e2bb; font-size: clamp(20px, 5vw, 34px); letter-spacing: 0.18em; font-weight: 300; }
    .intro-welcome.ru { letter-spacing: 0.06em; text-transform: none; }
    @keyframes introIn { from { transform: scale(0.97); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .modal.open { opacity: 1; pointer-events: auto; }
    .modal-overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(2px); }
    .modal-panel, .lang-modal {
      position: relative;
      z-index: 1;
      width: min(700px, 100%);
      max-height: 88vh;
      overflow: auto;
      border-radius: 20px;
      border: 1px solid rgba(207, 184, 124, 0.38);
      background: linear-gradient(180deg, #111 0%, #0b0b0b 100%);

      transition: transform 0.25s ease;
      box-shadow: 0 24px 50px rgba(0, 0, 0, 0.6);
    }
    .modal.open .modal-panel, .modal.open .lang-modal { transform: translateY(0); }
    .modal-close {
      position: sticky;
      top: 10px;
      margin-left: auto;
      margin-right: 10px;
      margin-top: 10px;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(8, 8, 8, 0.84);
      cursor: pointer;
      font-size: 18px;
      color: #fff;
    }
    .modal-media { aspect-ratio: 4 / 3; object-fit: cover; }
    .modal-body { padding: 16px; }
    .modal-title { margin: 0; font-size: 24px; font-weight: 300; letter-spacing: 0.05em; }
    .modal-text { margin: 8px 0 0; color: var(--muted); font-size: 14px; }
    .modal-tags { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 7px; }
    .modal-list { margin: 12px 0 0; padding: 0; list-style: none; display: grid; gap: 7px; }
    .modal-list li { border: 1px solid rgba(255, 255, 255, 0.09); background: rgba(255, 255, 255, 0.03); padding: 9px 10px; border-radius: 10px; font-size: 13px; }

    .language-modal { z-index: 125; align-items: center; }
    .lang-modal { width: min(430px, 100%); padding: 22px; }
    .lang-title { margin: 0; text-align: center; font-weight: 300; letter-spacing: 0.08em; font-size: 24px; }
    .lang-grid { margin-top: 16px; display: grid; gap: 10px; }
    .lang-pick {
      min-height: 52px;
      border-radius: 12px;
      border: 1px solid rgba(207, 184, 124, 0.34);
      background: rgba(255, 255, 255, 0.03);
      color: #fff;
      font-size: 14px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }
    .lang-pick:hover, .lang-pick:focus-visible { background: rgba(207, 184, 124, 0.14); transform: translateY(-1px); outline: none; }

    @media (min-width: 700px) {
      body { padding-bottom: 0; }
      .brand-logo { height: 40px; }
      .quick-grid, .reviews-grid, .contact-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .packages-grid, .services-grid { gap: 14px; }
      .preview-card, .service-tile, .gallery-card { min-height: 210px; }
      .mobile-bar { display: none; }
      .modal, .language-modal { align-items: center; }
      .modal-panel, .lang-modal { border-radius: 24px; }
    }

    @media (min-width: 1024px) {
      .section { padding: 80px 0; }
      .nav-links { display: flex; }
      .hero-grid { grid-template-columns: 1.1fr 0.9fr; gap: 28px; }
      .quick-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .packages-grid, .services-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .gallery-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
      .contact-grid { grid-template-columns: 0.95fr 1.05fr; }
      .preview-card:hover img, .service-tile:hover img, .gallery-card:hover img { transform: scale(1.04); }
    }
  </style>
</head>

    const appShell = document.getElementById('appShell');
    const introScreen = document.getElementById('introScreen');
    const introWelcome = document.getElementById('introWelcome');
    const languageModal = document.getElementById('languageModal');
    const languageTitle = document.getElementById('languageTitle');
    const quickGrid = document.getElementById('quickGrid');
    const packagesGrid = document.getElementById('packagesGrid');
    const servicesGrid = document.getElementById('servicesGrid');
    const galleryGrid = document.getElementById('galleryGrid');
    const reviewsGrid = document.getElementById('reviewsGrid');

    const detailModal = document.getElementById('detailModal');
    const modalImage = document.getElementById('modalImage');
    const modalTitle = document.getElementById('modalTitle');
    const modalText = document.getElementById('modalText');
    const modalTags = document.getElementById('modalTags');
    const modalList = document.getElementById('modalList');
    const modalActions = document.getElementById('modalActions');

    let currentLanguage = localStorage.getItem('preferredLanguage') || 'en';

    function getPath(obj, key) {
      return key.split('.').reduce((acc, item) => (acc ? acc[item] : ''), obj);
    }

    function updateStaticText() {
      const t = translations[currentLanguage];
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const value = getPath(t, el.dataset.i18n);
        if (typeof value === 'string') el.textContent = value;
      });
      languageTitle.textContent = t.languageTitle;
      introWelcome.textContent = t.introWelcome;
      introWelcome.classList.toggle('ru', currentLanguage === 'ru');
      document.documentElement.lang = currentLanguage;

      document.querySelectorAll('[data-lang-switch]').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.langSwitch === currentLanguage);
      });
    }

    function renderQuick() {
      const cards = translations[currentLanguage].quick.cards;
      quickGrid.innerHTML = cards.map(([title, note]) => `
        <article class="card quick-card"><p class="quick-title">${title}</p><p class="quick-note">${note}</p></article>
      `).join('');
    }

    function renderPackages() {
      const items = translations[currentLanguage].packages.items;
      packagesGrid.innerHTML = items.map((item, idx) => `
        <article class="preview-card" data-kind="package" data-index="${idx}">
          <img src="${item.image}" alt="${item.title}" />
          <div class="tile-overlay"><p class="tile-title">${item.title}</p></div>
        </article>
      `).join('');
    }

    function renderServices() {
      const items = translations[currentLanguage].services.items;
      servicesGrid.innerHTML = items.map((item, idx) => `
        <article class="service-tile" data-kind="service" data-index="${idx}">
          <img src="${item.image}" alt="${item.title}" />
          <div class="tile-overlay">
            <p class="tile-title">${item.short}</p>
            <div class="tile-tags">${item.tags.slice(0, 3).map((tag) => `<span class="tile-tag">${tag}</span>`).join('')}</div>
          </div>
        </article>
      `).join('');
    }

    function renderGallery() {
      const items = translations[currentLanguage].gallery.items;
      galleryGrid.innerHTML = items.map((item, idx) => `
        <article class="gallery-card" data-kind="gallery" data-index="${idx}">
          <img src="${item.image}" alt="${item.title}" />
          <div class="scene-label">${item.title || `Scene 0${idx + 1}`}</div>
        </article>
      `).join('');
    }

    function renderReviews() {
      const items = translations[currentLanguage].reviews.items;
      reviewsGrid.innerHTML = items.map((text) => `
        <article class="card review-card"><div class="stars">★★★★★</div><p class="review-text">${text}</p></article>
      `).join('');
    }

    function openDetails(kind, index) {
      const t = translations[currentLanguage];
      const item = t[kind].items[index];
      if (!item) return;
      modalImage.src = item.image;
      modalImage.alt = item.title;
      modalTitle.textContent = item.title;
      modalText.textContent = item.description || '';
      modalTags.innerHTML = (item.tags || []).map((tag) => `<span class="tile-tag">${tag}</span>`).join('');
      modalList.innerHTML = (item.list || []).map((line) => `<li>${line}</li>`).join('');
      modalActions.innerHTML = `<a class="btn btn-primary" href="https://wa.me/905010399572" target="_blank" rel="noreferrer">${kind === 'packages' ? t.buttons.bookPackage : t.buttons.askWhatsapp}</a>`;
      detailModal.classList.add('open');
      detailModal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeDetails() {
      detailModal.classList.remove('open');
      detailModal.setAttribute('aria-hidden', 'true');
      if (!languageModal.classList.contains('open')) document.body.style.overflow = '';
    }

    function attachGridEvents() {
      packagesGrid.querySelectorAll('.preview-card').forEach((el) => {
        el.addEventListener('click', () => openDetails('packages', Number(el.dataset.index)));
      });
      servicesGrid.querySelectorAll('.service-tile').forEach((el) => {
        el.addEventListener('click', () => openDetails('services', Number(el.dataset.index)));
      });
      galleryGrid.querySelectorAll('.gallery-card').forEach((el) => {
        el.addEventListener('click', () => openDetails('gallery', Number(el.dataset.index)));
      });
    }

    function applyLanguage(lang) {
      currentLanguage = translations[lang] ? lang : 'en';
      localStorage.setItem('preferredLanguage', currentLanguage);
      updateStaticText();
      renderQuick();
      renderPackages();
      renderServices();
      renderGallery();
      renderReviews();
      attachGridEvents();
    }

    function openLanguageModal() {
      languageModal.classList.add('open');
      languageModal.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeLanguageModal() {
      languageModal.classList.remove('open');
      languageModal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    function startExperience() {
      const saved = localStorage.getItem('preferredLanguage');
      applyLanguage(saved || 'en');
      const introDuration = saved ? 900 : 1400;
      setTimeout(() => {
        if (saved) {
          introScreen.classList.add('hide');
          appShell.classList.add('ready');
        } else {
          openLanguageModal();
        }
      }, introDuration);
    }

    document.querySelectorAll('[data-pick-lang]').forEach((btn) => {
      btn.addEventListener('click', () => {
        applyLanguage(btn.dataset.pickLang);
        closeLanguageModal();
        introScreen.classList.add('hide');
        appShell.classList.add('ready');
      });
    });

    document.querySelectorAll('[data-lang-switch]').forEach((btn) => {
      btn.addEventListener('click', () => applyLanguage(btn.dataset.langSwitch));
    });

    detailModal.addEventListener('click', (event) => {
      if (event.target.dataset.close === 'true') closeDetails();
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        closeDetails();
      }
    });

    startExperience();
  </script>
