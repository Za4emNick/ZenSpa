    :root {
      --bg: #f8f6f1;
      --surface: #ffffff;
      --surface-soft: #f2efe8;
      --text: #1f1f1c;
      --muted: #66635d;
      --line: #ded9cc;
      --accent: #1f8f5f;
      --accent-strong: #17774f;
      --radius: 16px;
      --shadow: 0 10px 28px rgba(32, 28, 18, 0.08);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      line-height: 1.45;
    }

    img { display: block; width: 100%; }
    a { color: inherit; text-decoration: none; }
    .container { width: min(1120px, calc(100% - 32px)); margin: 0 auto; }
    .section { padding: 56px 0; border-bottom: 1px solid var(--line); }
    .section-title { margin: 0; font-size: clamp(28px, 7vw, 48px); line-height: 1.07; letter-spacing: -0.02em; }
    .section-subtitle { margin: 10px 0 0; color: var(--muted); max-width: 720px; }

    .nav-wrap {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(248, 246, 241, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
    }
    .nav {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .brand { display: inline-flex; align-items: center; gap: 10px; }
    .brand-logo { height: 34px; width: auto; }
    .brand-text { margin: 0; font-size: 15px; letter-spacing: 0.12em; font-weight: 600; }

    .nav-links { display: none; gap: 14px; font-size: 13px; color: var(--muted); }

    .lang-switch {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
      background: #fff;
    }
    .lang-btn {
      min-width: 42px;
      min-height: 34px;
      border: 0;
      background: transparent;
      font-size: 12px;
      cursor: pointer;
      color: var(--muted);
    }
    .lang-btn.active {
      background: var(--surface-soft);
      color: var(--text);
      font-weight: 600;
    }

    .hero { padding: 48px 0 52px; }
    .hero-title { margin: 0; font-size: clamp(34px, 11vw, 72px); line-height: 0.98; letter-spacing: -0.03em; }
    .hero-sub { margin: 16px 0 0; max-width: 680px; color: var(--muted); font-size: clamp(16px, 3.8vw, 20px); }

    .actions { margin-top: 24px; display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      min-height: 48px;
      border-radius: 12px;
      border: 1px solid transparent;
      padding: 12px 16px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      font-size: 14px;
      font-weight: 600;
      transition: 0.2s ease;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-strong); }
    .btn-secondary { border-color: var(--line); background: #fff; color: var(--text); }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .services-grid,
    .benefits-grid,
    .gallery-grid,
    .reviews-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 24px; }

    .service-card { padding: 16px; display: grid; gap: 10px; }
    .service-head { display: flex; justify-content: space-between; gap: 8px; align-items: baseline; }
    .service-name { margin: 0; font-size: 18px; }
    .service-price { font-weight: 700; font-size: 18px; white-space: nowrap; }
    .service-meta { color: var(--muted); font-size: 14px; }

    .price-groups { margin-top: 20px; display: grid; gap: 14px; }
    .price-group { padding: 14px; }
    .price-group h3 { margin: 0 0 10px; font-size: 18px; }
    .price-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      padding: 9px 0;
      border-top: 1px dashed var(--line);
      font-size: 14px;
      align-items: center;
    }
    .price-row:first-of-type { border-top: 0; padding-top: 0; }
    .muted { color: var(--muted); }

    .benefit-item { padding: 16px; font-size: 15px; }

    .gallery-card { overflow: hidden; }
    .gallery-card img { aspect-ratio: 4/3; object-fit: cover; }

    .review-card { padding: 16px; }
    .review-text { margin: 0; font-size: 15px; }
    .review-meta { margin-top: 8px; color: var(--muted); font-size: 13px; }

    .contact-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 20px; }
    .contact-card { padding: 16px; }
    .contact-label { margin: 0; color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; }
    .contact-value { margin: 10px 0 0; font-size: 17px; }

    .map-wrap { padding: 10px; }
    .map { border: 0; width: 100%; min-height: 280px; border-radius: 12px; }

    .final-cta { padding: 24px; }

    .floating-wa {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 40;
      min-height: 52px;
      min-width: 52px;
      border-radius: 999px;
      padding: 0 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);
    }

    @media (min-width: 720px) {
      .services-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .benefits-grid, .reviews-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .gallery-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .contact-grid { grid-template-columns: 0.95fr 1.05fr; }
    }

    @media (min-width: 1000px) {
      .section { padding: 72px 0; }
      .nav-links { display: inline-flex; }
      .services-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .benefits-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .reviews-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }
  </style>
</head>

                ['VIP Package', '120 dk', '€110']
              ]
            },
            {
              title: 'Diğer Bakımlar',
              rows: [
                ['Yüz Maskesi', '20 dk', '€20'],
                ['Refleksoloji', '30 dk', '€30'],
                ['Vücut Peeling', '25 dk', '€22']
              ]
            }
          ]
        },
        why: { title: 'Neden Bizi Seçmelisiniz', items: ['Profesyonel terapistler', 'Temiz ve sakin atmosfer', 'Kolay WhatsApp rezervasyonu', 'Kemer’de merkezi konum'] },
        gallery: { title: 'Galeri', items: ['./Welcome.png', './Massage.png', './Turkishbath.png', './Bronze.png', './Face.png', './vip.png'] },
        reviews: {
          title: 'Yorumlar',
          items: [
            { text: 'Çok temiz spa ve masaj kalitesi harika.', by: 'Anna · Almanya' },
            { text: 'WhatsApp rezervasyonu çok hızlıydı.', by: 'Michael · Birleşik Krallık' },
            { text: 'Tatilde yaşadığım en iyi hamam deneyimi.', by: 'Irina · Rusya' },
            { text: 'Fiyatlar net, hizmet çok profesyonel.', by: 'Emre · Türkiye' }
          ]
        },
        contact: {
          title: 'Konum ve İletişim',
          addressLabel: 'Adres',
          address: 'Göynük mh. Başkomutan, Atatürk Cd. No:147-1 D:1, 07981 Kemer/Antalya',
          phoneLabel: 'Telefon / WhatsApp',
          hoursLabel: 'Çalışma Saatleri',
          hours: 'Her gün 08:00 – 20:00'
        },
        final: {
          title: 'Bakımınızı rezerve etmeye hazır mısınız?',
          subtitle: 'WhatsApp’tan bize yazın, seansınızı dakikalar içinde ayıralım.'
        }
      }
    };

    const popularGrid = document.getElementById('popularGrid');
    const priceGroups = document.getElementById('priceGroups');
    const benefitsGrid = document.getElementById('benefitsGrid');
    const galleryGrid = document.getElementById('galleryGrid');
    const reviewsGrid = document.getElementById('reviewsGrid');

    let currentLanguage = localStorage.getItem('preferredLanguage') || 'en';

    function getPath(obj, key) {
      return key.split('.').reduce((acc, item) => (acc ? acc[item] : ''), obj);
    }

    function buildWaLink(message) {
      return `https://wa.me/${whatsappPhone}?text=${encodeURIComponent(message)}`;
    }

    function updateWhatsAppLinks() {
      const t = translations[currentLanguage];
      document.querySelectorAll('.wa-link').forEach((link) => {
        const kind = link.dataset.waKind || 'general';
        if (kind === 'service') {
          const serviceName = link.dataset.serviceName || '';
          link.href = buildWaLink(`${t.wa.service}${serviceName}`);
          return;
        }
        link.href = buildWaLink(t.wa[kind] || t.wa.general);
      });
    }

    function renderPopular() {
      const t = translations[currentLanguage];
      popularGrid.innerHTML = t.popular.items.map((item) => `
        <article class="card service-card">
          <div class="service-head">
            <h3 class="service-name">${item.name}</h3>
            <span class="service-price">${item.price}</span>
          </div>
          <div class="service-meta">${item.desc}</div>
          <div class="service-meta">${item.duration}</div>
          <a class="btn btn-secondary wa-link" data-wa-kind="service" data-service-name="${item.name}" target="_blank" rel="noreferrer">${t.buttons.bookWhatsapp}</a>
        </article>
      `).join('');

    }

    function renderPriceList() {
      const t = translations[currentLanguage];
      priceGroups.innerHTML = t.priceList.groups.map((group) => `
        <article class="card price-group">
          <h3>${group.title}</h3>
          ${group.rows.map((row) => `
            <div class="price-row">
              <span>${row[0]}</span>
              <span class="muted">${row[1]}</span>
              <strong>${row[2]}</strong>
            </div>
          `).join('')}
        </article>
      `).join('');
    }

    function renderBenefits() {
      const t = translations[currentLanguage];
      benefitsGrid.innerHTML = t.why.items.map((item) => `<article class="card benefit-item">${item}</article>`).join('');
    }

    function renderGallery() {
      const t = translations[currentLanguage];
      galleryGrid.innerHTML = t.gallery.items.map((image) => `<article class="card gallery-card"><img src="${image}" alt="Spa interior" loading="lazy"></article>`).join('');
    }

    function renderReviews() {
      const t = translations[currentLanguage];
      reviewsGrid.innerHTML = t.reviews.items.map((item) => `
        <article class="card review-card">
          <p class="review-text">“${item.text}”</p>
          <div class="review-meta">${item.by}</div>
        </article>
      `).join('');
    }

    function updateStaticText() {
      const t = translations[currentLanguage];
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const value = getPath(t, el.dataset.i18n);
        if (typeof value === 'string') el.textContent = value;
      });

      document.querySelectorAll('[data-lang-switch]').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.langSwitch === currentLanguage);
      });

      document.documentElement.lang = currentLanguage;
    }

    function applyLanguage(lang) {
      currentLanguage = translations[lang] ? lang : 'en';
      localStorage.setItem('preferredLanguage', currentLanguage);
      updateStaticText();
      renderPopular();
      renderPriceList();
      renderBenefits();
      renderGallery();
      renderReviews();
      updateWhatsAppLinks();
    }

    document.querySelectorAll('[data-lang-switch]').forEach((btn) => {
      btn.addEventListener('click', () => applyLanguage(btn.dataset.langSwitch));
    });

    applyLanguage(currentLanguage);
  </script>
</body>
</html>
